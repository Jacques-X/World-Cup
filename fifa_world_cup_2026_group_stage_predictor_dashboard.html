                const saved = localStorage.getItem("wc26_predictions");

            });

                const saved = localStorage.getItem("wc26_actual_scores");

            const [simulatedPlayer, setSimulatedPlayer] = useState(1); // Player ID to simulate table standing for

            // Synchronize with LocalStorage
            useEffect(() => {
                localStorage.setItem("wc26_players", JSON.stringify(players));
            }, [players]);

            useEffect(() => {
                localStorage.setItem("wc26_predictions", JSON.stringify(predictions));
            }, [predictions]);

            useEffect(() => {
                localStorage.setItem("wc26_actual_scores", JSON.stringify(actualScores));
            }, [actualScores]);

            // Clear predictions and resets
            const handleReset = () => {
                if (confirm("Are you sure you want to delete ALL predictions and actual scores?")) {
                    setPredictions({});
                    setActualScores({});
                }
            };

            // Export to File
            const handleExport = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({
                    players, predictions, actualScores
                }, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", "wc2026_predictions_backup.json");
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
            };

            // Import from File
            const handleImport = (e) => {
                const fileReader = new FileReader();
                fileReader.onload = event => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed.players) setPlayers(parsed.players);
                        if (parsed.predictions) setPredictions(parsed.predictions);
                        if (parsed.actualScores) setActualScores(parsed.actualScores);
                        alert("Predictions imported successfully!");
                    } catch (err) {
                        alert("Error parsing file. Ensure it is a valid predictions export file.");
                    }
                };
                if(e.target.files[0]) {
                    fileReader.readAsText(e.target.files[0]);
                }
            };

            // Core Scoring Calculator
            // 10 pts = Exact score, 5 pts = Correct outcome / tie (wrong score), 0 pt = incorrect
            const calculatedPoints = useMemo(() => {
                const points = {};
                players.forEach(p => points[p.id] = { total: 0, exact: 0, outcome: 0 });

                MATCHES_DATA.forEach(m => {
                    const actual = actualScores[m.id];
                    if (actual && actual.home !== undefined && actual.away !== undefined && actual.home !== "" && actual.away !== "") {
                        const actH = parseInt(actual.home);
                        const actA = parseInt(actual.away);
                        const actOutcome = actH > actA ? 'home' : (actH < actA ? 'away' : 'draw');

                        players.forEach(p => {
                            const predKey = `${m.id}_${p.id}`;
                            const pred = predictions[predKey];
                            if (pred && pred.home !== undefined && pred.away !== undefined && pred.home !== "" && pred.away !== "") {
                                const predH = parseInt(pred.home);
                                const predA = parseInt(pred.away);
                                const predOutcome = predH > predA ? 'home' : (predH < predA ? 'away' : 'draw');

                                if (actH === predH && actA === predA) {
                                    points[p.id].total += 10;
                                    points[p.id].exact += 1;
                                } else if (actOutcome === predOutcome) {
                                    points[p.id].total += 5;
                                    points[p.id].outcome += 1;
                                }
                            }
                        });
                    }
                });

                return points;
            }, [predictions, actualScores, players]);

            // Dynamic Standings simulation based on either predictions of a player, or the actual scores
            const simulatedStandings = useMemo(() => {
                const tables = {};
                
                // Initialize clean table for each group
                GROUPS.forEach(g => {
                    tables[g] = {};
                    Object.values(TEAMS).forEach(t => {
                        if (t.group === g) {
                            tables[g][t.name] = {
                                name: t.name,
                                flag: t.flag,
                                played: 0,
                                won: 0,
                                drawn: 0,
                                lost: 0,
                                gf: 0,
                                ga: 0,
                                gd: 0,
                                pts: 0
                            };
                        }
                    });
                });

                // Apply Match calculations
                MATCHES_DATA.forEach(m => {
                    let homeScore = "";
                    let awayScore = "";

                    if (simulatedPlayer === "actual") {
                        const act = actualScores[m.id];
                        if (act && act.home !== "" && act.away !== "") {
                            homeScore = act.home;
                            awayScore = act.away;
                        }
                    } else {
                        const predKey = `${m.id}_${simulatedPlayer}`;
                        const pred = predictions[predKey];
                        if (pred && pred.home !== "" && pred.away !== "") {
                            homeScore = pred.home;
                            awayScore = pred.away;
                        }
                    }

                    if (homeScore !== "" && awayScore !== "") {
                        const hS = parseInt(homeScore);
                        const aS = parseInt(awayScore);
                        const g = m.group;

                        tables[g][m.home].played += 1;
                        tables[g][m.away].played += 1;
                        tables[g][m.home].gf += hS;
                        tables[g][m.home].ga += aS;
                        tables[g][m.away].gf += aS;
                        tables[g][m.away].ga += hS;

                        if (hS > aS) {
                            tables[g][m.home].won += 1;
                            tables[g][m.home].pts += 3;
                            tables[g][m.away].lost += 1;
                        } else if (hS < aS) {
                            tables[g][m.away].won += 1;
                            tables[g][m.away].pts += 3;
                            tables[g][m.home].lost += 1;
                        } else {
                            tables[g][m.home].drawn += 1;
                            tables[g][m.home].pts += 1;
                            tables[g][m.away].drawn += 1;
                            tables[g][m.away].pts += 1;
                        }
                    }
                });

                // Calculate GD & sort standings inside each group (Pts -> GD -> GF -> Alphabetical)
                GROUPS.forEach(g => {
                    Object.keys(tables[g]).forEach(t => {
                        const team = tables[g][t];
                        team.gd = team.gf - team.ga;
                    });
                    
                    tables[g] = Object.values(tables[g]).sort((a, b) => {
                        if (b.pts !== a.pts) return b.pts - a.pts;
                        if (b.gd !== a.gd) return b.gd - a.gd;
                        if (b.gf !== a.gf) return b.gf - a.gf;
                        return a.name.localeCompare(b.name);
                    });
                });

                return tables;

        // --- SUB-COMPONENTS ---

        // Flag CDN Utility component

        // Match Component Card rendering a match and player predictions
        function MatchCard({ match, players, predictions, actualScores, onScoreChange }) {
            const homeTeam = TEAMS[match.home];
            const awayTeam = TEAMS[match.away];

            const act = actualScores[match.id] || { home: "", away: "" };

            // Format Match Date beautifully
            const parsedDate = new Date(match.date);

            return (
                <div class="bg-slate-900 rounded-xl border border-slate-800 hover:border-slate-700 transition overflow-hidden shadow-md">
                    {/* Top Match Info Row */}

                        <div class="flex items-center gap-3">
                            <span class="bg-slate-800 text-lime-400 px-2.5 py-0.5 rounded-full font-bold font-sport">MATCH {match.id}</span>
                            <span class="bg-slate-800 text-slate-300 px-2 py-0.5 rounded font-sport">GROUP {match.group}</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <span>📅 {formattedDate}</span>
                            <span class="mx-1">•</span>
                            <span>⏰ {match.time} ET</span>
                            <span class="mx-1">•</span>
                            <span class="text-slate-300">📍 {match.venue}</span>
                        </div>
                    </div>

                    {/* Team Names and Input Row */}
                    <div class="p-4 flex flex-col lg:flex-row items-center justify-between gap-6">
                        {/* Team flags and scores */}
                        <div class="flex items-center gap-4 w-full lg:w-1/2">
                            {/* Home side */}
                            <div class="flex items-center gap-3 flex-1 justify-end">
                                <span class="font-sport text-lg font-bold text-slate-100 text-right truncate">{match.home}</span>
                                <FlagIcon code={homeTeam.flag} className="w-8 h-5 flex-shrink-0" />
                            </div>

                            {/* Actual Match Outcome Score */}
                            <div class="flex items-center gap-1.5 bg-slate-950 p-1.5 rounded-lg border border-slate-800">
                                <input 
                                    type="text" 
                                    value={act.home} 
                                    onChange={(e) => onScoreChange(match.id, "actual", "home", e.target.value)}
                                    placeholder="-"
                                    class="w-8 h-8 bg-slate-900 text-center border border-slate-800 text-lime-400 font-sport text-lg font-bold rounded focus:ring-1 focus:ring-lime-500 focus:outline-none"
                                />
                                <span class="text-xs font-bold text-slate-400">ACTUAL</span>
                                <input 
                                    type="text" 
                                    value={act.away} 
                                    onChange={(e) => onScoreChange(match.id, "actual", "away", e.target.value)}
                                    placeholder="-"
                                    class="w-8 h-8 bg-slate-900 text-center border border-slate-800 text-lime-400 font-sport text-lg font-bold rounded focus:ring-1 focus:ring-lime-500 focus:outline-none"
                                />
                            </div>

                            {/* Away side */}
                            <div class="flex items-center gap-3 flex-1">
                                <FlagIcon code={awayTeam.flag} className="w-8 h-5 flex-shrink-0" />
                                <span class="font-sport text-lg font-bold text-slate-100 truncate">{match.away}</span>
                            </div>
                        </div>

                        {/* Predictor inputs */}
                        <div class="w-full lg:w-1/2 grid grid-cols-5 gap-2 border-t lg:border-t-0 border-slate-800 pt-4 lg:pt-0">
                            {players.map(p => {
                                const predKey = `${match.id}_${p.id}`;
                                const pred = predictions[predKey] || { home: "", away: "" };
                                
                                // Point highlights check
                                let ptsHighlight = "";
                                if (act.home !== "" && act.away !== "" && pred.home !== "" && pred.away !== "") {
                                    const aH = parseInt(act.home);
                                    const aA = parseInt(act.away);
                                    const pH = parseInt(pred.home);
                                    const pA = parseInt(pred.away);
                                    
                                    const aOutcome = aH > aA ? 'H' : (aH < aA ? 'A' : 'D');
                                    const pOutcome = pH > pA ? 'H' : (pH < pA ? 'A' : 'D');

                                    if (aH === pH && aA === pA) {
                                        ptsHighlight = "border-2 border-emerald-500 bg-emerald-950/20"; // Exact
                                    } else if (aOutcome === pOutcome) {
                                        ptsHighlight = "border border-blue-500 bg-blue-950/10"; // Outcome
                                    } else {
                                        ptsHighlight = "border border-red-500/20 bg-slate-950/30"; // Lost
                                    }
                                }

                                return (
                                    <div 
                                        key={p.id} 
                                        class={`p-2 rounded-xl bg-slate-950 border border-slate-800 flex flex-col items-center gap-1.5 transition ${ptsHighlight}`}
                                    >
                                        <span class="text-[10px] font-bold tracking-wider text-slate-400 truncate w-full text-center uppercase">
                                            {p.name}
                                        </span>
                                        <div class="flex items-center gap-1">
                                            <input 
                                                type="text" 
                                                value={pred.home}
                                                onChange={(e) => onScoreChange(match.id, p.id, "home", e.target.value)}
                                                placeholder="0"
                                                class="w-6 h-6 bg-slate-900 text-center border border-slate-800 text-slate-200 font-sport text-xs font-semibold rounded focus:ring-1 focus:ring-lime-500 focus:outline-none"
                                            />
                                            <span class="text-[10px] text-slate-600 font-bold">-</span>
                                            <input 
                                                type="text" 
                                                value={pred.away}
                                                onChange={(e) => onScoreChange(match.id, p.id, "away", e.target.value)}
                                                placeholder="0"
                                                class="w-6 h-6 bg-slate-900 text-center border border-slate-800 text-slate-200 font-sport text-xs font-semibold rounded focus:ring-1 focus:ring-lime-500 focus:outline-none"
                                            />
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        // Render React DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
